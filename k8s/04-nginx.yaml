---
# nginx.conf stored as a ConfigMap — replaces the volume mount in docker-compose.
# Key change: upstream server is "fastapi-svc:8000" (K8s Service) not "api:8000" (Docker container)
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: fastapi-app
data:
  nginx.conf: |
    worker_processes auto;

    events {
        worker_connections 1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;

        gzip on;
        gzip_types application/json text/plain text/css application/javascript;

        access_log /var/log/nginx/access.log;
        error_log  /var/log/nginx/error.log;

        upstream fastapi_app {
            server fastapi-svc:8000;
        }

        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

        server {
            listen 80;
            server_name localhost;

            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-XSS-Protection "1; mode=block";
            add_header X-Content-Type-Options "nosniff";

            location / {
                limit_req zone=api_limit burst=20 nodelay;
                proxy_pass http://fastapi_app;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 60s;
                proxy_read_timeout    60s;
            }

            location /health {
                proxy_pass http://fastapi_app/health;
                access_log off;
            }
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: fastapi-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config-volume
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf   # mount only the file, not the whole directory
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: nginx-config-volume
          configMap:
            name: nginx-config

---
# NodePort exposes Nginx to your machine (replaces docker-compose "ports: 8090:80")
# Access at: http://<node-ip>:30090  or  http://localhost:30090 (minikube)
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  namespace: fastapi-app
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30090
