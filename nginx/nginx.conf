# ─────────────────────────────────────────────────────────────
# worker_processes: how many CPU cores Nginx can use
# "auto" = detect automatically
# ─────────────────────────────────────────────────────────────
worker_processes auto;

events {
    # Max simultaneous connections per worker
    worker_connections 1024;
}

http {
    # ── Basic settings ────────────────────────────────────────
    include       /etc/nginx/mime.types;   # maps file extensions to Content-Type headers
    default_type  application/octet-stream;

    # Enable gzip compression — reduces response size by ~70%
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Upstream block ────────────────────────────────────────
    # "upstream" defines a pool of backend servers.
    # Nginx forwards requests to one of these.
    # The name "fastapi_app" is used below in proxy_pass.
    # ─────────────────────────────────────────────────────────
    upstream fastapi_app {
        server api:8000;    # "api" = service name in docker-compose.yml
                            # Docker DNS resolves "api" → container IP
        # To load balance across multiple instances, add more:
        # server api_2:8000;
        # server api_3:8000;
    }

    # ── Rate limiting ─────────────────────────────────────────
    # Limit each IP to 10 requests per second
    # "binary_remote_addr" stores IP in binary (uses less memory)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ── Server block ──────────────────────────────────────────
    # A "server" block = one virtual host (like a website)
    # You can have multiple server blocks for multiple domains
    # ─────────────────────────────────────────────────────────
    server {
        listen 80;                  # listen on port 80 (HTTP)
        server_name localhost;      # domain name (use your real domain in production)

        # ── Security headers ──────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
        add_header X-Content-Type-Options "nosniff";

        # ── Location block ────────────────────────────────────
        # "/" means: apply this rule to ALL incoming requests
        # ─────────────────────────────────────────────────────
        location / {
            # Apply rate limiting (burst=20 allows short spikes)
            limit_req zone=api_limit burst=20 nodelay;

            # Forward the request to the upstream (FastAPI)
            proxy_pass http://fastapi_app;

            # These headers tell FastAPI the real client IP and protocol
            # Without them, FastAPI sees Nginx's IP, not the browser's IP
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts — how long Nginx waits for FastAPI to respond
            proxy_connect_timeout 60s;
            proxy_read_timeout    60s;
        }

        # ── Health check endpoint (bypass rate limit) ─────────
        location /health {
            proxy_pass http://fastapi_app/health;
            access_log off;   # don't clutter logs with health check noise
        }
    }
}
