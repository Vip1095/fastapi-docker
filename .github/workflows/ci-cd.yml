name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  IMAGE_NAME: ghcr.io/vip1095/fastapi-docker

jobs:
  # ────────────────────────────────────────────────
  # JOB 1: Run tests
  # Runs on GitHub's free cloud runners
  # ────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (including dev)
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests/ -v

  # ────────────────────────────────────────────────
  # JOB 2: Build and push Docker image to GHCR
  # Only runs on push to master (not on PRs)
  # ────────────────────────────────────────────────
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by GitHub, no setup needed

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────
  # JOB 3: Deploy to local minikube
  # Runs on a SELF-HOSTED runner on your machine
  # (GitHub cloud runners can't reach local clusters)
  # ────────────────────────────────────────────────
  deploy:
    name: Deploy to Minikube
    runs-on: self-hosted        # your machine must have a runner registered
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR (so runner can pull private image)
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u vip1095 --password-stdin

      - name: Ensure minikube is running
        run: minikube status || minikube start

      - name: Pull latest image into minikube
        run: |
          docker pull ${{ env.IMAGE_NAME }}:latest
          minikube image load ${{ env.IMAGE_NAME }}:latest

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/01-secrets.yaml
          kubectl apply -f k8s/02-postgres.yaml
          kubectl apply -f k8s/03-fastapi.yaml
          kubectl apply -f k8s/04-nginx.yaml

      - name: Update deployment image to latest SHA
        run: |
          kubectl set image deployment/fastapi \
            fastapi=${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            -n fastapi-app

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/fastapi -n fastapi-app --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n fastapi-app
          kubectl get services -n fastapi-app
